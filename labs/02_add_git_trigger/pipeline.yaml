apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: lab2-pipeline
spec:
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
    - name: message
      type: string

  tasks:
    - name: echo-task
      taskRef:
        name: echo
      params:
        - name: message
          value: "$(params.message)"

    - name: checkout-task
      runAfter:
        - echo-task
      taskRef:
        name: checkout
      params:
        - name: repo-url
          value: "$(params.repo-url)"
        - name: branch
          value: "$(params.branch)"